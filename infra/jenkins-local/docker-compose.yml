services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JENKINS_BASE_IMAGE: ${JENKINS_BASE_IMAGE:-jenkins/jenkins:jdk21}
    container_name: idolglow-jenkins
    restart: unless-stopped
    ports:
      - "7077:8080"
      - "57077:50000"
    environment:
      TZ: Asia/Seoul
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false -Duser.timezone=Asia/Seoul"
      JENKINS_ADMIN_ID: "${JENKINS_ADMIN_ID:-admin}"
      JENKINS_ADMIN_PASSWORD: "${JENKINS_ADMIN_PASSWORD:-IdolGlow!7077}"
      GITHUB_CREDENTIALS_ID: "${GITHUB_CREDENTIALS_ID:-github-http-token}"
      GITHUB_USERNAME: "${GITHUB_USERNAME:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GITHUB_REPO_URL: "${GITHUB_REPO_URL:-}"
      GITHUB_BRANCH: "${GITHUB_BRANCH:-*/main}"
      JENKINS_JOB_NAME: "${JENKINS_JOB_NAME:-IdolGlow}"
      JENKINS_SCM_POLL: "${JENKINS_SCM_POLL:-H/2 * * * *}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      TELEGRAM_CREDENTIALS_TOKEN_ID: "${TELEGRAM_CREDENTIALS_TOKEN_ID:-telegram-bot-token}"
      TELEGRAM_CREDENTIALS_CHAT_ID: "${TELEGRAM_CREDENTIALS_CHAT_ID:-telegram-chat-id}"
    volumes:
      - jenkins_home:/var/jenkins_home
      - type: bind
        source: ${IDOLGLOW_WORKSPACE}
        target: /workspace/IdolGlow
      - type: bind
        source: ${JENKINS_DEPLOY_HOST_PATH}
        target: /deployments
      - gradle_cache:/var/jenkins_home/.gradle-user
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:8080/login >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

volumes:
  jenkins_home:
  gradle_cache:
