name: Telegram Commit Notification

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  notify-telegram:
    name: Send Telegram commit notification
    runs-on: ubuntu-latest

    steps:
      - name: Send rolling 2-hour commit notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |
          python3 <<'PYTHON'
          import html
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          from collections import Counter
          from datetime import datetime, timedelta, timezone

          AGGREGATION_HOURS = 2
          MAX_DISPLAY_COMMITS = 20
          MAX_API_PAGES = 5
          COMMITS_PER_PAGE = 100

          KST = timezone(timedelta(hours=9))


          telegram_token = os.environ.get(
              "TELEGRAM_BOT_TOKEN",
              ""
          ).strip()

          telegram_chat_id = os.environ.get(
              "TELEGRAM_CHAT_ID",
              ""
          ).strip()

          github_token = os.environ.get(
              "GITHUB_TOKEN",
              ""
          ).strip()

          github_event_path = os.environ.get(
              "GITHUB_EVENT_PATH",
              ""
          ).strip()

          github_repository = os.environ.get(
              "GITHUB_REPOSITORY",
              ""
          ).strip()


          if not telegram_token:
              raise RuntimeError(
                  "TELEGRAM_BOT_TOKEN Secret이 비어 있습니다."
              )

          if not telegram_chat_id:
              raise RuntimeError(
                  "TELEGRAM_CHAT_ID Secret이 비어 있습니다."
              )

          if not github_token:
              raise RuntimeError(
                  "GITHUB_TOKEN이 비어 있습니다."
              )

          if not github_event_path:
              raise RuntimeError(
                  "GITHUB_EVENT_PATH가 비어 있습니다."
              )

          if not github_repository:
              raise RuntimeError(
                  "GITHUB_REPOSITORY가 비어 있습니다."
              )

          def escape_text(value):
              return html.escape(
                  str(value or "")
              )


          def escape_url(value):
              return html.escape(
                  str(value or ""),
                  quote=True
              )


          def first_line(value):
              text = str(value or "").strip()

              if not text:
                  return "(커밋 메시지 없음)"

              return text.splitlines()[0].strip()


          def parse_github_datetime(value):
              if not value:
                  return None

              try:
                  return datetime.fromisoformat(
                      value.replace(
                          "Z",
                          "+00:00"
                      )
                  )

              except ValueError:
                  return None


          def format_kst_time(value):
              parsed = parse_github_datetime(value)

              if parsed is None:
                  return ""

              return parsed.astimezone(
                  KST
              ).strftime(
                  "%m-%d %H:%M"
              )


          def get_commit_author(commit_data):


              linked_author = (
                  commit_data.get("author")
                  or {}
              )

              github_login = linked_author.get(
                  "login"
              )

              if github_login:
                  return github_login

              git_commit = (
                  commit_data.get("commit")
                  or {}
              )

              git_author = (
                  git_commit.get("author")
                  or {}
              )

              author_name = git_author.get(
                  "name"
              )

              return author_name or "unknown"


          def get_commit_date(commit_data):
   
              git_commit = (
                  commit_data.get("commit")
                  or {}
              )

              author_data = (
                  git_commit.get("author")
                  or {}
              )

              committer_data = (
                  git_commit.get("committer")
                  or {}
              )

              return (
                  author_data.get("date")
                  or committer_data.get("date")
                  or ""
              )


          def github_api_get(url):
              request = urllib.request.Request(
                  url=url,
                  headers={
                      "Accept": (
                          "application/vnd.github+json"
                      ),
                      "Authorization": (
                          f"Bearer {github_token}"
                      ),
                      "User-Agent": (
                          "github-actions-telegram-notify"
                      )
                  },
                  method="GET"
              )

              try:
                  with urllib.request.urlopen(
                      request,
                      timeout=30
                  ) as response:
                      return json.loads(
                          response.read().decode(
                              "utf-8"
                          )
                      )

              except urllib.error.HTTPError as error:
                  body = error.read().decode(
                      "utf-8",
                      errors="replace"
                  )

                  raise RuntimeError(
                      "GitHub API 호출 실패: "
                      f"HTTP {error.code} {body}"
                  ) from error

              except urllib.error.URLError as error:
                  raise RuntimeError(
                      f"GitHub API 연결 실패: {error}"
                  ) from error


          def fetch_recent_commits(
              repository,
              branch,
              since_value
          ):

              commits_by_sha = {}

              for page in range(
                  1,
                  MAX_API_PAGES + 1
              ):
                  query = urllib.parse.urlencode({
                      "sha": branch,
                      "since": since_value,
                      "per_page": COMMITS_PER_PAGE,
                      "page": page
                  })

                  api_url = (
                      "https://api.github.com/repos/"
                      f"{repository}/commits?{query}"
                  )

                  page_commits = github_api_get(
                      api_url
                  )

                  if not isinstance(
                      page_commits,
                      list
                  ):
                      raise RuntimeError(
                          "GitHub Commit API 응답이 "
                          "배열 형식이 아닙니다."
                      )

                  for commit_data in page_commits:
                      sha = commit_data.get(
                          "sha",
                          ""
                      )

                      if sha:
                          commits_by_sha[sha] = (
                              commit_data
                          )

                  if len(page_commits) < COMMITS_PER_PAGE:
                      break

              recent_commits = list(
                  commits_by_sha.values()
              )

              recent_commits.sort(
                  key=lambda item: (
                      get_commit_date(item)
                  ),
                  reverse=True
              )

              return recent_commits


          def send_telegram_message(message):
              payload = {
                  "chat_id": telegram_chat_id,
                  "text": message,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": True
              }

              api_url = (
                  "https://api.telegram.org/"
                  f"bot{telegram_token}/sendMessage"
              )

              request = urllib.request.Request(
                  url=api_url,
                  data=json.dumps(
                      payload
                  ).encode("utf-8"),
                  headers={
                      "Content-Type": "application/json"
                  },
                  method="POST"
              )

              try:
                  with urllib.request.urlopen(
                      request,
                      timeout=30
                  ) as response:
                      result = json.loads(
                          response.read().decode(
                              "utf-8"
                          )
                      )

              except urllib.error.HTTPError as error:
                  body = error.read().decode(
                      "utf-8",
                      errors="replace"
                  )

                  raise RuntimeError(
                      "Telegram API 호출 실패: "
                      f"HTTP {error.code} {body}"
                  ) from error

              except urllib.error.URLError as error:
                  raise RuntimeError(
                      f"Telegram API 연결 실패: {error}"
                  ) from error

              if not result.get("ok"):
                  raise RuntimeError(
                      f"Telegram 전송 실패: {result}"
                  )

              return result

          with open(
              github_event_path,
              "r",
              encoding="utf-8"
          ) as event_file:
              event = json.load(event_file)

          if event.get("deleted"):
              print(
                  "Branch deletion event. "
                  "Notification skipped."
              )
              sys.exit(0)


          ref = event.get(
              "ref",
              ""
          )

          if not ref.startswith(
              "refs/heads/"
          ):
              print(
                  "This is not a branch push. "
                  "Notification skipped."
              )
              sys.exit(0)


          branch = ref.removeprefix(
              "refs/heads/"
          )

          push_actor = (
              event.get(
                  "sender",
                  {}
              ).get("login")
              or event.get(
                  "pusher",
                  {}
              ).get("name")
              or "unknown"
          )


          current_push_commits = event.get(
              "commits",
              []
          )


          repository_data = event.get(
              "repository",
              {}
          )

          repository_url = (
              repository_data.get("html_url")
              or (
                  "https://github.com/"
                  f"{github_repository}"
              )
          )


          compare_url = event.get(
              "compare",
              ""
          )


          now_utc = datetime.now(
              timezone.utc
          )

          since_utc = now_utc - timedelta(
              hours=AGGREGATION_HOURS
          )

          since_value = since_utc.strftime(
              "%Y-%m-%dT%H:%M:%SZ"
          )


          recent_commits = fetch_recent_commits(
              repository=github_repository,
              branch=branch,
              since_value=since_value
          )


          author_counts = Counter()

          for commit_data in recent_commits:
              author_name = get_commit_author(
                  commit_data
              )

              author_counts[author_name] += 1


          total_commit_count = len(
              recent_commits
          )

          current_push_count = len(
              current_push_commits
          )


          lines = [
              "🚀 <b>GitHub 커밋 알림</b>",
              "",
              (
                  "📦 저장소: "
                  f"<b>{escape_text(github_repository)}</b>"
              ),
              (
                  "🌿 브랜치: "
                  f"<code>{escape_text(branch)}</code>"
              ),
              (
                  "🚚 Push 실행자: "
                  f"<b>{escape_text(push_actor)}</b>"
              ),
              "",
              (
                  f"⏱ 집계 범위: "
                  f"<b>최근 {AGGREGATION_HOURS}시간</b>"
              ),
              (
                  "📊 누적 커밋: "
                  f"<b>{total_commit_count}개</b>"
              ),
              (
                  "🆕 이번 Push: "
                  f"<b>{current_push_count}개</b>"
              )
          ]

          if author_counts:
              lines.extend([
                  "",
                  "👥 <b>커밋 작성자별 집계</b>"
              ])

              for author_name, count in (
                  author_counts.most_common()
              ):
                  lines.append(
                      "• "
                      f"{escape_text(author_name)}: "
                      f"<b>{count}개</b>"
                  )

          lines.extend([
              "",
              "📝 <b>최근 커밋 목록</b>"
          ])


          display_commits = recent_commits[
              :MAX_DISPLAY_COMMITS
          ]


          if display_commits:
              for commit_data in display_commits:
                  sha = commit_data.get(
                      "sha",
                      ""
                  )

                  short_sha = sha[:7]

                  commit_info = (
                      commit_data.get("commit")
                      or {}
                  )

                  commit_message = first_line(
                      commit_info.get("message")
                  )

                  author_name = get_commit_author(
                      commit_data
                  )

                  commit_time = format_kst_time(
                      get_commit_date(commit_data)
                  )

                  commit_url = (
                      commit_data.get("html_url")
                      or (
                          f"{repository_url}/commit/"
                          f"{sha}"
                      )
                  )

                  commit_line = (
                      f'• <a href="{escape_url(commit_url)}">'
                      f'<code>{escape_text(short_sha)}</code>'
                      "</a> "
                      f"{escape_text(commit_message)}"
                  )

                  commit_line += (
                      "\n  └ "
                      f"작성자: {escape_text(author_name)}"
                  )

                  if commit_time:
                      commit_line += (
                          f" · {escape_text(commit_time)}"
                      )

                  lines.append(commit_line)

          else:
              lines.append(
                  "• 최근 집계 범위에 커밋이 없습니다."
              )


          remaining_count = (
              total_commit_count
              - len(display_commits)
          )

          if remaining_count > 0:
              lines.extend([
                  "",
                  f"… 외 {remaining_count}개 커밋"
              ])


          if compare_url:
              lines.extend([
                  "",
                  (
                      f'🔎 <a href="'
                      f'{escape_url(compare_url)}">'
                      "이번 Push 변경 내용 보기</a>"
                  )
              ])


          message = "\n".join(
              lines
          )

          if len(message) > 4000:
              message = (
                  message[:3900]
                  + "\n\n… 메시지가 길어 일부 생략됐습니다."
              )


          result = send_telegram_message(
              message
          )


          telegram_message_id = (
              result.get(
                  "result",
                  {}
              ).get("message_id")
          )


          print(
              "Telegram notification sent successfully."
          )

          print(
              f"Repository={github_repository}"
          )

          print(
              f"Branch={branch}"
          )

          print(
              f"PushActor={push_actor}"
          )

          print(
              f"CurrentPushCount={current_push_count}"
          )

          print(
              f"RollingCommitCount={total_commit_count}"
          )

          print(
              f"AuthorCounts={dict(author_counts)}"
          )

          print(
              f"TelegramMessageId={telegram_message_id}"
          )
          PYTHON
