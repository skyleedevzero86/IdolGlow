name: Telegram Commit Notification

on:
  push:

permissions:
  contents: read

jobs:
  notify-telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram commit notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PYTHON'
          import html
          import json
          import os
          import urllib.request

          token = os.environ.get("TELEGRAM_BOT_TOKEN")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID")

          if not token:
              raise RuntimeError(
                  "TELEGRAM_BOT_TOKEN secret이 비어 있습니다."
              )

          if not chat_id:
              raise RuntimeError(
                  "TELEGRAM_CHAT_ID secret이 비어 있습니다."
              )

          # GitHub Actions가 기본 제공하는 push 이벤트 JSON 파일
          event_path = os.environ["GITHUB_EVENT_PATH"]

          with open(event_path, "r", encoding="utf-8") as file:
              event = json.load(file)

          repository = event["repository"]["full_name"]
          repository_url = event["repository"]["html_url"]
          branch = event["ref"].removeprefix("refs/heads/")

          sender = (
              event.get("sender", {}).get("login")
              or event.get("pusher", {}).get("name")
              or "unknown"
          )

          commits = event.get("commits", [])
          compare_url = event.get("compare", "")

          lines = [
              "🚀 <b>GitHub Push</b>",
              "",
              f"👤 작성자: <b>{html.escape(sender)}</b>",
              f"📦 저장소: <b>{html.escape(repository)}</b>",
              f"🌿 브랜치: <code>{html.escape(branch)}</code>",
              f"📝 커밋: <b>{len(commits)}개</b>",
              ""
          ]

          for commit in commits[:20]:
              commit_id = commit["id"]
              short_id = commit_id[:7]

              message = (
                  commit.get("message", "")
                  .splitlines()[0]
                  .strip()
              )

              commit_url = (
                  f"{repository_url}/commit/{commit_id}"
              )

              lines.append(
                  f'• <a href="{html.escape(commit_url)}">'
                  f'<code>{html.escape(short_id)}</code></a> '
                  f'{html.escape(message)}'
              )

          if len(commits) > 20:
              lines.append(
                  f"\n… 외 {len(commits) - 20}개 커밋"
              )

          if compare_url:
              lines.extend([
                  "",
                  f'🔎 <a href="{html.escape(compare_url)}">'
                  "전체 변경 내용 보기</a>"
              ])

          message = "\n".join(lines)

          payload = {
              "chat_id": chat_id,
              "text": message,
              "parse_mode": "HTML",
              "disable_web_page_preview": True
          }

          request = urllib.request.Request(
              url=(
                  f"https://api.telegram.org/"
                  f"bot{token}/sendMessage"
              ),
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json"
              },
              method="POST"
          )

          with urllib.request.urlopen(
              request,
              timeout=20
          ) as response:
              result = json.loads(
                  response.read().decode("utf-8")
              )

          if not result.get("ok"):
              raise RuntimeError(
                  f"Telegram API 오류: {result}"
              )

          print("메세지 발송이 성곡되었습니다.")
          PYTHON
