def send_discord_message(payload):
    separator = (
        "&"
        if "?" in discord_webhook_url
        else "?"
    )

    request_url = (
        discord_webhook_url
        + separator
        + "wait=true"
    )

    request = urllib.request.Request(
        url=request_url,
        data=json.dumps(
            payload,
            ensure_ascii=False
        ).encode("utf-8"),
        headers={
            "Content-Type": (
                "application/json; charset=utf-8"
            ),
            "Accept": "application/json",

            # Discord가 요구하는 정상적인 User-Agent
            "User-Agent": (
                "DiscordBot "
                f"(https://github.com/{github_repository}, 1.0)"
            )
        },
        method="POST"
    )

    try:
        with urllib.request.urlopen(
            request,
            timeout=30
        ) as response:
            body = response.read().decode(
                "utf-8"
            )

            print(
                "Discord response status:",
                response.status
            )

            return body

    except urllib.error.HTTPError as error:
        body = error.read().decode(
            "utf-8",
            errors="replace"
        )

        raise RuntimeError(
            "Discord Webhook 호출 실패: "
            f"HTTP {error.code} {body}"
        ) from error

    except urllib.error.URLError as error:
        raise RuntimeError(
            f"Discord 연결 실패: {error}"
        ) from error