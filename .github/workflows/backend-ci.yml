name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Quality gate (PR)
        if: github.event_name == 'pull_request'
        run: ./gradlew test detekt runKtlintCheckOverMainSourceSet --build-cache --parallel --console=plain

      - name: Build and quality gate (main)
        if: github.event_name == 'push'
        run: ./gradlew bootJar test detekt runKtlintCheckOverMainSourceSet --build-cache --parallel --console=plain
